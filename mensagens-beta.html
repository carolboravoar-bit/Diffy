<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #F7F7F5;
    color: #2C2C2C;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #D81B60;
    margin-bottom: 8px;
  }

  .header p {
    color: #9E9E9E;
    font-size: 14px;
  }

  .info-box {
    background: #FCE4EC;
    border: 1px solid #D81B60;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 40px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    font-size: 14px;
    line-height: 1.6;
  }

  .info-box strong { color: #D81B60; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 16px;
    border: 1px solid #EFEFEF;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .card-header {
    background: #D81B60;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-header h2 {
    color: white;
    font-size: 16px;
    font-weight: 600;
  }

  .card-header .email-badge {
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .message-box {
    background: #F7F7F5;
    margin: 16px;
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: #2C2C2C;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
    position: relative;
  }

  .message-box:hover {
    border-color: #D81B60;
  }

  .copy-hint {
    font-size: 11px;
    color: #9E9E9E;
    text-align: right;
    padding: 0 16px 14px;
  }

  .copied {
    background: #E8F5E9;
    color: #2E7D32;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    display: inline-block;
    margin-right: 16px;
    margin-bottom: 12px;
    display: none;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px 14px;
  }

  .btn-copy {
    background: #D81B60;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .btn-copy:hover { opacity: 0.85; }

  .tag-real {
    background: #E8F5E9;
    color: #2E7D32;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .tag-temp {
    background: #FFF8E1;
    color: #795548;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
</style>

function gerarMensagem(p) {

const grid = document.getElementById('grid');

  card.innerHTML = `
    <div class="card-header">
      <h2>${p.nomeCompleto}</h2>
      <span class="email-badge">${p.login}</span>
    </div>
    <div class="message-box" id="msg-${i}">${msg}</div>
    <div class="card-footer">
      <span class="${p.emailReal ? 'tag-real' : 'tag-temp'}">${p.emailReal ? '✓ E-mail real' : '⏳ E-mail temporário'}</span>
      <button class="btn-copy" onclick="copiar(${i}, '${p.nomeCompleto}')">Copiar mensagem</button>
    </div>
  `;
  grid.appendChild(card);
});

function copiar(i, nome) {
  const el = document.getElementById('msg-' + i);
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = el.closest('.card').querySelector('.btn-copy');
    const original = btn.innerText;
    btn.innerText = '✓ Copiado!';
    btn.style.background = '#2E7D32';
    setTimeout(() => {
      btn.innerText = original;
      btn.style.background = '#D81B60';
    }, 2000);
  });
}
